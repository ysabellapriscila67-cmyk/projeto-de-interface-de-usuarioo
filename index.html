<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r.e.m. beauty</title>

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>r.e.m. beauty</h1>
    <p class="subtitle">interstellar dreamscape</p>

    <p>junte-se à nossa tripulação</p>

    <form id="formulario">
        <label>nome</label><br>
        <input type="text" id="nome"><br>

        <label>e-mail</label><br>
        <input type="email" id="email"><br><br>

        <button type="submit">inscrever-se</button>
    </form>

    <!-- POPUP -->
    <div id="popup" class="popup">
        <div class="popup-box">
            <p id="popup-msg"></p>
            <button onclick="fecharPopup()">fechar</button>
        </div>
    </div>

    <script>
        const form = document.getElementById("formulario");
        const popup = document.getElementById("popup");
        const popupMsg = document.getElementById("popup-msg");

        function abrirPopup(mensagem, tipo) {
            popupMsg.innerHTML = mensagem;
            popup.className = "popup " + tipo;
            popup.style.display = "flex";
        }

        function fecharPopup() {
            popup.style.display = "none";
        }

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const nome = document.getElementById("nome").value.trim();
            const email = document.getElementById("email").value.trim();

            if (nome === "" || email === "") {
                abrirPopup(
                    "⚠️ ops<br>por favor, preencha todos os campos.",
                    "erro"
                );
            } else {
                abrirPopup(
                    "🚀 bem-vindo(a) ao espaço<br>obrigado por se juntar a nós, <b>" 
                    + nome + "</b>!<br>em breve você receberá novidades em <b>" + email + "</b>.",
                    "sucesso"
                );
                form.reset();
            }
        });
    </script>

</body>
</html>
